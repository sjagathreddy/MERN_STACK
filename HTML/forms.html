<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/position.css">
    <style>
    h2 {
    color: blue;  
    }  
    </style>
</head>
<body>
    <div>
        <header>
            <h1>Forms</h1>
        </header>
        <main>
            <form>
                <label>name:</label>
                <input type="text" name="name" placeholder="Eg: S Lava Kumar"> <br>
                <label>email:</label>
                <input type="email" name="email" placeholder="Eg: llava90@example.com"> <br>
                <label>password:</label>
                <input type="password" name="password" placeholder="Eg: Lava@123"> <br>
                <label>mobile:</label>
                <input type="tel" name="mobile" placeholder="Eg: 9177422714"> <br>
                <label>gender:</label>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <input type="radio" name="gender" value="other"> Other <br>
                <label>Qualification:</label>
                <input type="checkbox"> 10 <sup>th</sup>
                <input type="checkbox">12 <sup>th</sup>
                <input type="checkbox"> Diploma
                <input type="checkbox"> Degree
                <input type="checkbox"> Bachelor
                <input type="checkbox"> Master <br>
                <label>D.O.B</label>
                <input type="datetime-local"> <br>
                <label>color:</label>
                <input type="color"> <br>
                <label>image:</label>
                <input type="file" accept="image/*"> <br>
                <button type="submit">Submit</button>
            </form>
        </main>
        <footer>
            <p>© 2024 Forms. All rights reserved.</p>
        </footer>
        
    </div>
</body>
</html>
